<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differential Equations</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .diff-lookup { margin-top: 10px; position: relative; }
        .diff-input {
            width: 100%;
            min-height: 48px;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-family: 'MyFont';
            font-size: 28px;
            color: #00ff00;
            background-color: #000000;
            border: 2px solid #00ff00;
            box-shadow: 0 0 6px #00ff00;
            outline: none;
            letter-spacing: 0.05em;
            line-height: 1.4;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
            font-smooth: never;
            box-sizing: border-box;
        }
        .diff-input::placeholder { color: #007700; }
        .diff-hint { font-size: 18px; color: #007700; margin-top: 8px; }
    </style>
</head>
<body>
    <script src="script.js"></script>
    <script> function goToMainMenu() { window.location.href = "index.html"; }</script>
    <button id="backButton" onclick="goToMainMenu()">Main Menu</button>
    <div class="content">
        <p>DIFFERENTIAL | 02-03-2026</p>
        <p>
            Type x' and y' as JavaScript expressions.
            <br><br>
        </p>
        <div id="diff-lookup" class="diff-lookup">
            <label style="display:block; font-size: 22px; margin-bottom: 4px;">x' =</label>
            <input type="text" id="eqDX" class="diff-input" placeholder="e.g. x - y">
            <br>
            <label style="display:block; font-size: 22px; margin-bottom: 4px;">y' =</label>
            <input type="text" id="eqDY" class="diff-input" placeholder="e.g. -x + y">
            <p class="diff-hint">Use t, x, y and Math.* (e.g. Math.sin(t)). Origin (0,0) is center; screen spans -10 to 10 in x and y.</p>
            <br>
            <div style="text-align: center;">
                <button id="diffApply" style="position: relative; padding: 12px 24px; background-color: #000000; color: #00ff00; font-size: 18px; font-family: 'MyFont'; border: 2px solid #00ff00; border-radius: 6px; box-shadow: 0 0 10px #00ff00; cursor: url('assets/images/curser/curser_select.png') 10 10, auto; text-transform: uppercase; transition: transform 0.3s ease, background-color 0.3s ease;" onmouseover="this.style.backgroundColor='#33ff33'; this.style.transform='scale(1.1)';" onmouseout="this.style.backgroundColor='#000000'; this.style.transform='scale(1)';" onmousedown="this.style.backgroundColor='#00ff00'; this.style.color='#000000'; this.style.boxShadow='0 0 15px #33ff33';" onmouseup="this.style.backgroundColor='#33ff33'; this.style.color='#00ff00'; this.style.boxShadow='0 0 10px #00ff00';">PLAY!</button>
            </div>
        </div>
        <p><br><br></p>
    </div>
    <script>
        document.getElementById('diffApply').addEventListener('click', function() {
            applyDiffEquations(
                document.getElementById('eqDX').value.trim() || '0',
                document.getElementById('eqDY').value.trim() || '0'
            );
            document.querySelector('.content').remove();
        });
    </script>
</body>
</html>
